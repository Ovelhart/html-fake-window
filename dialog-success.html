<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instalação Concluída</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none;
  background:radial-gradient(ellipse 70% 50% at 20% 80%,rgba(255,80,180,.18) 0%,transparent 55%),radial-gradient(ellipse 50% 70% at 80% 20%,rgba(100,140,255,.15) 0%,transparent 55%),linear-gradient(145deg,#0a0a1a 0%,#12083a 30%,#0a1840 60%,#18083a 100%);}
.dialog{position:fixed;width:400px;background:rgba(243,243,243,.97);backdrop-filter:blur(60px) saturate(1.8);-webkit-backdrop-filter:blur(60px) saturate(1.8);border:1px solid rgba(255,255,255,.65);border-radius:8px;box-shadow:0 0 0 1px rgba(255,255,255,.25) inset,0 2px 6px rgba(0,0,0,.12),0 12px 32px rgba(0,0,0,.28),0 32px 80px rgba(0,0,0,.22);overflow:hidden;animation:winOpen .22s cubic-bezier(.34,1.2,.64,1);}
@keyframes winOpen{from{opacity:0;transform:scale(.93) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.titlebar{height:32px;background:linear-gradient(180deg,#f9f9f9 0%,#f0f0f0 100%);border-bottom:1px solid #d4d4d4;display:flex;align-items:center;padding:0 0 0 10px;cursor:move;}
.titlebar-icon{width:16px;height:16px;margin-right:7px;flex-shrink:0;}
.titlebar-text{flex:1;font-size:12px;color:#1a1a1a;pointer-events:none;}
.win-btns{display:flex;height:32px;}
.wc{width:46px;height:32px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;cursor:default;transition:background .08s;}
.wc svg{width:10px;height:10px;pointer-events:none;}
.wc:hover{background:rgba(0,0,0,.08);}
.wc.close{border-radius:0 8px 0 0;}
.wc.close:hover{background:#c42b1c;}
.wc.close:hover line{stroke:#fff!important;}
.dialog-body{background:#fff;padding:24px 22px 20px;border-bottom:1px solid #e4e4e4;}
.success-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.success-icon{width:48px;height:48px;background:#107c10;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.success-icon svg{width:26px;height:26px;}
.dialog-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.dialog-msg{font-size:12px;color:#555;line-height:1.6;}
.progress-area{margin-top:4px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:#666;margin-bottom:5px;}
.progress-bar{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:#107c10;border-radius:3px;width:100%;transition:width .5s;}
.checklist{margin-top:14px;display:flex;flex-direction:column;gap:5px;}
.check-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#555;}
.check-item.done{color:#107c10;}
.dialog-foot{padding:10px 12px 12px;display:flex;justify-content:flex-end;gap:7px;background:#f0f0f0;}
.wbtn{height:26px;min-width:80px;padding:0 14px;font:12px 'Segoe UI',sans-serif;color:#1a1a1a;background:#f0f0f0;border:1px solid #b0b0b0;border-radius:3px;cursor:default;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 0 rgba(255,255,255,.9) inset;transition:background .07s,border-color .07s;outline:none;}
.wbtn:hover{background:#e5f1fb;border-color:#7eb4ea;}
.wbtn:active{background:#cce2f8;border-color:#5a9ad8;}
.wbtn:focus{outline:2px solid rgba(0,120,212,.35);outline-offset:1px;}
.wbtn.primary{background:#0078d4;color:#fff;border-color:#005a9e;box-shadow:none;}
.wbtn.primary:hover{background:#106ebe;}
</style>
</head>
<body>
<div class="dialog" id="dialog">
  <div class="titlebar" id="titlebar">
    <svg class="titlebar-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="6.5" fill="#107c10"/>
      <path d="M5 8l2 2 4-4" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="titlebar-text">Assistente de Instalação do Windows</span>
    <div class="win-btns">
      <button class="wc" onclick="dialog.style.display='none'"><svg viewBox="0 0 10 10"><rect x="0" y="4.5" width="10" height="1" fill="#4a4a4a"/></svg></button>
      <button class="wc" style="opacity:.4;pointer-events:none;"><svg viewBox="0 0 10 10"><path d="M.5.5h9v9H.5z" stroke="#4a4a4a" stroke-width="1" fill="none"/></svg></button>
      <button class="wc close" onclick="dialog.style.display='none'">
        <svg viewBox="0 0 10 10" fill="none"><line x1="1" y1="1" x2="9" y2="9" stroke="#4a4a4a" stroke-width="1.2" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="#4a4a4a" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
  <div class="dialog-body">
    <div class="success-header">
      <div class="success-icon">
        <svg viewBox="0 0 26 26" fill="none"><path d="M5 13l5 5 11-11" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="dialog-title">Instalação concluída com sucesso!</div>
        <div class="dialog-msg">html-fake-window v1.0.0 foi instalado.</div>
      </div>
    </div>
    <div class="progress-area">
      <div class="progress-label"><span>Progresso total</span><span>100%</span></div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
    <div class="checklist">
      <div class="check-item done">✅ Arquivos copiados para C:\Arquivos de Programas</div>
      <div class="check-item done">✅ Atalhos criados na área de trabalho</div>
      <div class="check-item done">✅ Registro do sistema atualizado</div>
      <div class="check-item done">✅ Componentes verificados com sucesso</div>
    </div>
  </div>
  <div class="dialog-foot">
    <button class="wbtn primary" id="btn-restart">Reiniciar agora</button>
    <button class="wbtn" id="btn-later">Mais tarde</button>
  </div>
</div>
<script>
const dlg=document.getElementById('dialog');
const bar=document.getElementById('titlebar');
function center(){dlg.style.left=Math.round((innerWidth-dlg.offsetWidth)/2)+'px';dlg.style.top=Math.round((innerHeight-dlg.offsetHeight)/2)+'px';}
window.addEventListener('load',center);window.addEventListener('resize',center);
let drag=false,ox=0,oy=0;
bar.addEventListener('mousedown',e=>{if(e.target.closest('.wc'))return;drag=true;ox=e.clientX-dlg.getBoundingClientRect().left;oy=e.clientY-dlg.getBoundingClientRect().top;e.preventDefault();});
document.addEventListener('mousemove',e=>{if(!drag)return;dlg.style.left=Math.max(0,Math.min(e.clientX-ox,innerWidth-dlg.offsetWidth))+'px';dlg.style.top=Math.max(0,Math.min(e.clientY-oy,innerHeight-dlg.offsetHeight))+'px';});
document.addEventListener('mouseup',()=>drag=false);
bar.addEventListener('touchstart',e=>{if(e.target.closest('.wc'))return;const t=e.touches[0];drag=true;ox=t.clientX-dlg.getBoundingClientRect().left;oy=t.clientY-dlg.getBoundingClientRect().top;},{passive:true});
document.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];dlg.style.left=Math.max(0,Math.min(t.clientX-ox,innerWidth-dlg.offsetWidth))+'px';dlg.style.top=Math.max(0,Math.min(t.clientY-oy,innerHeight-dlg.offsetHeight))+'px';},{passive:true});
document.addEventListener('touchend',()=>drag=false);
document.getElementById('btn-restart').onclick=()=>{
  dlg.querySelector('.dialog-body').innerHTML=`<div style="padding:20px 0;text-align:center;"><div style="font-size:48px;margin-bottom:12px;">🔄</div><div style="font-weight:600;font-size:14px;margin-bottom:8px;">Reiniciando…</div><div style="font-size:12px;color:#666;">O sistema será reiniciado em breve.</div></div>`;
  dlg.querySelector('.dialog-foot').style.display='none';
};
document.getElementById('btn-later').onclick=()=>dlg.style.display='none';
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('btn-later').click();});
setTimeout(()=>document.getElementById('btn-restart').focus(),150);
</script>
</body>
</html>
